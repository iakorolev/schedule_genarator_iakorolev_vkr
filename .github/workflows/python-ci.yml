name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Install and smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall app.py core webapp

      - name: Smoke test dependencies
        run: python -c "import flask, pandas, openpyxl, werkzeug; print('DEPENDENCIES_OK')"

      - name: Smoke test project imports
        run: python -c "from webapp.app import app; import core.pipeline; print('PROJECT_IMPORTS_OK'); print(app.url_map)"

  package:
    name: Build delivery artifact
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create delivery bundle
        run: |
          mkdir release_bundle
          cp -r core webapp docs examples release_bundle/
          cp app.py README.md requirements.txt .gitignore release_bundle/
          tar -czf schedule_generator_bundle.tar.gz release_bundle

      - name: Upload delivery artifact
        uses: actions/upload-artifact@v4
        with:
          name: schedule-generator-bundle
          path: schedule_generator_bundle.tar.gz